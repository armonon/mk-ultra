name: build-and-test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure
        env:
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

      # Actually load + exercise the built plugin (instantiate, open/close the
      # editor, sweep parameters, process audio, save/restore state) on a real
      # Windows / macOS machine. This is the "does it work in a host" check that
      # plain compilation can't give us. Runs on the two platforms we ship.
      - name: Validate plugin (pluginval)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          PV_VER=1.0.3
          VST3="build/ci/plugin/Entropy_artefacts/Release/VST3/MK Ultra.vst3"
          [ -e "$VST3" ] || VST3="$(find build/ci -name 'MK Ultra.vst3' | head -1)"
          echo "Validating: $VST3"
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sL -o pv.zip "https://github.com/Tracktion/pluginval/releases/download/v${PV_VER}/pluginval_Windows.zip"
            7z x -y -opv pv.zip >/dev/null
            ./pv/pluginval.exe --strictness-level 5 --validate "$VST3"
          else
            curl -sL -o pv.zip "https://github.com/Tracktion/pluginval/releases/download/v${PV_VER}/pluginval_macOS.zip"
            unzip -q pv.zip -d pv
            ./pv/pluginval.app/Contents/MacOS/pluginval --strictness-level 5 --validate "$VST3"
          fi

      - name: Upload plugin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MK-Ultra-${{ runner.os }}
          path: |
            build/ci/plugin/Entropy_artefacts/**/VST3
            build/ci/plugin/Entropy_artefacts/**/AU
            build/ci/plugin/Entropy_artefacts/**/Standalone
            build/ci/plugin/Entropy_artefacts/**/LV2
          if-no-files-found: ignore
